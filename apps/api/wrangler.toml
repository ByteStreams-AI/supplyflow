name = "supplyflow-api"
main = "src/index.ts"
compatibility_date = "2025-05-26"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = ""  # set in production

[[queues.producers]]
binding = "TASK_QUEUE"
queue = "supplyflow-tasks"

[[queues.consumers]]
queue = "supplyflow-tasks"
max_batch_size = 10
max_batch_timeout = 5

[triggers]
crons = []  # cron triggers are in apps/jobs

[vars]
ENVIRONMENT = "development"

# Secrets — set via `wrangler secret put <KEY>` in CI/production.
# For local dev, copy .dev.vars.example → .dev.vars and fill in values.
# SUPABASE_URL =
# SUPABASE_SERVICE_ROLE_KEY =
# SUPABASE_DB_URL =          ← Transaction pooler URL (port 6543)
# SUPABASE_JWT_SECRET =
# STRIPE_SECRET_KEY =
# STRIPE_WEBHOOK_SECRET =
# RESEND_API_KEY =
# ANTHROPIC_API_KEY =
# ML_SERVICE_URL =
# ML_SERVICE_API_KEY =
